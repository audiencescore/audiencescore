name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Lint, test, conformance, and demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          # Node 24+: the v0.2 store uses the built-in node:sqlite module.
          node-version: 24

      - name: Install reference-impl dependencies (lockfile-exact)
        run: npm ci
        working-directory: reference-impl

      - name: Syntax check
        run: |
          for f in reference-impl/src/*.js reference-impl/src/v02/*.js reference-impl/src/pilot/*.js reference-impl/api/*.js reference-impl/demo.js reference-impl/test/*.js reference-impl/test/v02/*.js reference-impl/test/pilot/*.js; do
            node --check "$f"
          done

      - name: Check docs links
        run: node .github/scripts/check-links.js

      - name: Unit and acceptance tests (v0.2 pilot suite + AT-1..AT-25)
        run: node --test reference-impl/test/*.test.js reference-impl/test/v02/*.test.js reference-impl/test/pilot/*.test.js

      - name: End-to-end demo
        run: node reference-impl/demo.js

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install conformance verifier dependencies
        run: pip install -r conformance/requirements.txt

      - name: Reference conformance vectors (16 expectations)
        run: python verify_vectors.py
        working-directory: conformance

      - name: Canonical-bytes fixture matches the reference (AT-4 honesty check)
        run: python gen_canonical_fixture.py --check
        working-directory: conformance
