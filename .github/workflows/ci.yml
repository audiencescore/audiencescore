name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Lint, test, and run the demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Syntax check
        run: |
          for f in reference-impl/src/*.js reference-impl/demo.js reference-impl/test/*.js; do
            node --check "$f"
          done

      - name: Check docs links
        run: node .github/scripts/check-links.js

      - name: Unit tests
        run: node --test reference-impl/test/*.test.js

      - name: End-to-end demo
        run: node reference-impl/demo.js
