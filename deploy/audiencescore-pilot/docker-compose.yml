services:
  audiencescore-pilot:
    build:
      context: ../..
      dockerfile: Dockerfile.pilot
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: audiencescore-pilot
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    volumes:
      - ${AUDIENCESCORE_HOST_DATA_DIR:-/opt/audiencescore-pilot/data}:/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  proxy:
    external: true
    name: ${AUDIENCESCORE_PROXY_NETWORK:-proxy}
